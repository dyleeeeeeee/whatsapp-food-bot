# ============================================================
# wrangler.toml — WhatsApp Food Bot
# ============================================================

name               = "whatsapp-food-bot"
main               = "src/index.js"
compatibility_date = "2024-09-23"
# nodejs_compat intentionally removed — codebase uses zero Node APIs.
# Adding it only bloats the bundle and increases cold-start time.

# ─── KV Namespaces ───────────────────────────────────────────
[[kv_namespaces]]
binding = "SESSION_KV"
id = "023f47a2c967435a930ce36e15473282"
preview_id = "31a1d3e96d1c441a95c30dee3fd6f23d"

# ─── D1 Database ─────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "food-bot-db"
database_id   = "0bcc31a6-ed24-4874-8cd8-ddf800c3e825"

# ─── R2 Bucket (optional, for menu images) ───────────────────
# [[r2_buckets]]
# binding     = "IMAGES"
# bucket_name = "food-bot-images"

# ─── Environment Variables ───────────────────────────────────
# Set secrets via: wrangler secret put WHATSAPP_TOKEN
# Never commit real values here.

[vars]
ENVIRONMENT      = "production"
MENU_CACHE_TTL   = "300"       # seconds to cache menu in KV
GRAPH_API_VERSION = "v21.0"   # BUG-22: configurable, not hardcoded
FLUTTERWAVE_CALLBACK_URL = "https://flutterwave.com/pay"  # Redirect URL after payment

# ─── Optional feature flags (leave unset to keep current behavior) ──
# CHECKOUT_FLOW_ID — customer checkout uses the WhatsApp Flow in
#   flows/checkout.json instead of the text-based flow. (UX-04)
CHECKOUT_FLOW_ID = "989465703956996"
#
# ADD_ITEM_FLOW_ID — admin Add-Item uses the WhatsApp Flow in flows/add-item.json. (UX-13)
#   Dropdown rebuilt with real category IDs (8=Drinks, 9=Snacks, 10=Main Menu) and
#   re-published. NOTE: the dropdown is static — re-publish the flow after adding
#   any new category, or every pick of it will fail validation.
ADD_ITEM_FLOW_ID = "1577064570804706"
#
# FLUTTERWAVE_WEBHOOK_SECRET — REQUIRED for webhook acceptance (hard-fail
#   if missing). It is a secret, so it is NOT set here. Set it with:
#     wrangler secret put FLUTTERWAVE_WEBHOOK_SECRET

# ─── Staging ─────────────────────────────────────────────────
[env.staging]
name = "whatsapp-food-bot-staging"

[env.staging.vars]
ENVIRONMENT       = "staging"
GRAPH_API_VERSION = "v21.0"
MENU_CACHE_TTL    = "60"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1